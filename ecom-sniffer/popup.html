<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ecom Sniffer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      background: #0d1117;
      color: #e6edf3;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
    }
    .title { font-weight: 700; font-size: 15px; color: #58a6ff; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; flex-shrink: 0; }
    .stats { display: flex; border-bottom: 1px solid #21262d; }
    .stat {
      flex: 1;
      padding: 12px 10px;
      text-align: center;
      border-right: 1px solid #21262d;
    }
    .stat:last-child { border-right: none; }
    .stat-val { font-size: 22px; font-weight: 700; color: #e6edf3; }
    .stat-lbl { font-size: 10px; color: #8b949e; margin-top: 2px; }
    section { padding: 12px 16px; border-bottom: 1px solid #21262d; }
    section h2 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .pending-count { font-size: 28px; font-weight: 700; color: #d29922; }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 10px;
      color: #8b949e;
      text-align: left;
      padding-bottom: 4px;
      text-transform: uppercase;
    }
    td { font-size: 12px; padding: 4px 0; border-top: 1px solid #21262d; color: #e6edf3; }
    .profit { color: #3fb950; font-weight: 600; }
    .actions { display: flex; flex-direction: column; gap: 6px; padding: 12px 16px; }
    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn-green { background: #238636; color: #fff; }
    .btn-green:hover:not(:disabled) { background: #2ea043; }
    .btn-blue { background: #1f6feb; color: #fff; }
    .btn-blue:hover:not(:disabled) { background: #388bfd; }
    .btn-gray { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-gray:hover:not(:disabled) { background: #30363d; }
    .error-banner {
      display: none;
      padding: 8px 12px;
      background: #3d1a1a;
      border-top: 1px solid #f85149;
      font-size: 11px;
      color: #f85149;
    }
    #scan-result {
      display: none;
      padding: 6px 16px;
      font-size: 11px;
      color: #3fb950;
      background: #0f2a1a;
      border-top: 1px solid #238636;
    }
  </style>
</head>
<body>
  <header>
    <span class="dot" id="conn-dot"></span>
    <span class="title">Ecom Sniffer</span>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="stat-listings">—</div>
      <div class="stat-lbl">Active Listings</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-sales">—</div>
      <div class="stat-lbl">Sales (7d)</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-rate">—</div>
      <div class="stat-lbl">Fulfil Rate</div>
    </div>
  </div>

  <section>
    <h2>Pending Orders</h2>
    <div class="pending-count" id="pending-count">—</div>
  </section>

  <section>
    <h2>Top Opportunities</h2>
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody id="opps-tbody">
        <tr><td colspan="3" style="color:#8b949e;">Loading…</td></tr>
      </tbody>
    </table>
  </section>

  <div class="actions">
    <button class="btn btn-green" id="btn-scan">Scan Competitors</button>
    <button class="btn btn-blue" id="btn-opps">View Opportunities</button>
    <button class="btn btn-gray" id="btn-orders">Check Orders</button>
    <button class="btn btn-gray" id="btn-set-key">Set API Key</button>
  </div>

  <div id="scan-result"></div>
  <div class="error-banner" id="error-banner"></div>

  <script src="popup.js"></script>
</body>
</html>
